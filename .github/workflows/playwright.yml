name: End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Set up environment files
        run: |
          # For drizzle-kit (reads .env.test when NODE_ENV=test)
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.test
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env.test
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.test
          echo "NODE_ENV=test" >> .env.test
          # For Next.js (reads .env.local automatically)
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.local
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env.local
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.local

      - name: Verify environment setup
        run: |
          echo "Checking .env.local:"
          grep -q "DATABASE_URL=" .env.local && echo "✓ DATABASE_URL found in .env.local"
          echo "Checking .env.test:"
          grep -q "DATABASE_URL=" .env.test && echo "✓ DATABASE_URL found in .env.test"

      - name: Run database migrations
        run: NODE_ENV=test npx drizzle-kit push

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
